# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Monitor npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    # Group minor and patch updates together to reduce PR noise
    groups:
      # Group all minor and patch updates into a single PR
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      # Keep major updates separate for careful review
    # Limit the number of open PRs
    open-pull-requests-limit: 5
    # Add labels to PRs for easy filtering
    labels:
      - "dependencies"
      - "automated"
    # Rebase PRs when commits are made to the target branch
    rebase-strategy: "auto"
    # Add reviewers (optional - configure based on your team)
    # reviewers:
    #   - "team-name"
    # Commit message configuration
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Monitor GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
